kind = "web"
previewPath = "/"
title = "BidGenius"
version = "1.0.0"
id = "artifacts/bidgenius"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22910
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/bidgenius run dev"

[services.env]
PORT = "22910"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/bidgenius", "run", "build"]
publicDir = "artifacts/bidgenius/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
